<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Socials</title>

<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.28);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: white;
    background:
      linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
      url("https://images.unsplash.com/photo-1433024730544-5f8e3e2cc6c8?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 32px 20px 40px;
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
  }

  /* Profile */
  .profile {
    text-align: center;
    margin-bottom: 32px;
    padding: 36px 24px;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 12px;
    background:
      url("IMG_9335.jpeg")
      center / cover no-repeat;
  }

  .name {
    font-size: 22px;
    font-weight: 600;
  }

  .bio {
    font-size: 14px;
    opacity: 0.9;
    margin-top: 4px;
  }

  /* Socials */
  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
  }

  .social-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: transparent;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .social-icon:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.14);
  }

  .social-icon img {
    width: 22px;
    height: 22px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .grid-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 14px;
    text-decoration: none;
    color: white;
    text-align: center;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .grid-card:hover {
    transform: scale(1.03);
    background: rgba(255,255,255,0.2);
  }

  .grid-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    flex-shrink: 0;
    object-fit: cover;
  }

  .grid-label {
    font-size: 14px;
    font-weight: 500;
  }

</style>
</head>

<body>

<div class="container">
  <div class="profile glass">
    <div class="avatar"></div>
    <div class="name">Goga Davide</div>
    <div class="bio">Roblox Game Developer<br>Let's connect!<br>✝️</div>

    <div class="socials">
    <a href="https://www.instagram.com/goga.davide" class="social-icon" title="Instagram">
      <img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram">
    </a>

    <a href="https://discord.com/users/697103917238190102" class="social-icon" title="Business Inquiries (Discord)">
      <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
    </a>

    <a href="mailto:davide.goga@gmail.com" class="social-icon" title="Business Inquiries (Gmail)">
      <img src="https://cdn.simpleicons.org/gmail/ffffff" alt="Gmail">
    </a>
    </div>
  </div>

  <div class="grid">
    <a href="https://www.roblox.com/games/118055952211055/Hack-A-Business" class="grid-card glass">
      <img class="grid-icon" src="https://cdn.simpleicons.org/roblox/ffffff" alt="Roblox">
      <span class="grid-label">Play my Latest Game</span>
    </a>

    <a href="https://www.roblox.com/communities/287664347/Matthew-7-7" class="grid-card glass">
      <img class="grid-icon" src="https://cdn.simpleicons.org/roblox/ffffff" alt="Roblox">
      <span class="grid-label">Join My Community</span>
    </a>
  </div>
</div>

</body>
</html>
